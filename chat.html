<!DOCTYPE html>

<html>

<head>

<title>
Lion SMP Chat
</title>


<link rel="stylesheet" href="assets/style.css">

<script src="assets/websocket.js"></script>


</head>


<body>


<header>

<h1>
🦁 Lion SMP Chat
</h1>

</header>




<div class="container">


<div class="console"
id="chat">

</div>


<input id="name"
placeholder="Your name">


<input id="msg"
placeholder="Message">


<button onclick="sendChat()">

Send

</button>


</div>





<script>


window.addEventListener(

"mcwebbridge",

(e)=>{


let d=e.detail;



if(d.type==="chat"){


chat.innerHTML +=

"<b>"
+
d.name
+
"</b>: "
+
d.message
+
"<br>";



}



});







function sendChat(){


sendPacket({

type:"chat",

name:name.value,

message:msg.value


});


msg.value="";


}



</script>


</body>

</html>
