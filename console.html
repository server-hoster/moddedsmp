<!DOCTYPE html>

<html>

<head>

<title>
Lion SMP Console
</title>


<link rel="stylesheet" href="assets/style.css">

<script src="assets/websocket.js"></script>


</head>



<body>


<header>

<h1>
🦁 Server Console
</h1>


<nav>

<a href="index.html">
Dashboard
</a>

<a href="chat.html">
Chat
</a>


</nav>


</header>





<div class="container">


<div class="card">


<input id="user"
placeholder="Username">


<input id="pass"
type="password"
placeholder="Password">


<button onclick="doLogin()">
Login
</button>


</div>





<div class="console"
id="console">

</div>





<div class="card"
id="adminBox"
style="display:none">


<input id="cmd"
placeholder="Command">


<button onclick="command()">

Execute

</button>


</div>



</div>





<script>


function doLogin(){


login(

user.value,

pass.value

);



}



window.addEventListener(

"mcwebbridge",

(e)=>{


let d=e.detail;



if(
d.type==="login_result"
&&
d.success
){


role=d.role;


if(role==="admin")

adminBox.style.display="block";


}



if(d.type==="console"){


console.innerHTML +=

d.message
+
"<br>";


console.scrollTop=
console.scrollHeight;


}



});





function command(){


sendPacket({

type:"command",

command:
cmd.value


});


}



</script>


</body>


</html>
