<script>


connectWS(()=>{


socket.send(JSON.stringify({

type:"status"

}));

});



socket.onmessage=e=>{


let data=JSON.parse(e.data);



if(data.type==="status"){


status.innerHTML="🟢 Online";


cpu.innerHTML=data.cpu+"%";

ram.innerHTML=data.ram;

tps.innerHTML=data.tps;

players.innerHTML=data.players;


}



};
